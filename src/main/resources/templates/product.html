<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
	th:replace="~{base::layout(~{::section})}">
<head>
<meta charset="UTF-8">
<title>Product</title>

<style>

.list-group-item.active {
    z-index: 2;
    
    background-color: #DC3545;
    border-color: #DC3545;
}

element.style {
    z-index: 2;
    /* color: #DC3545; */
    background-color: #DC3545;
    border-color: #DC3545;
}

</style>
</head>
<body>
	<section>
		<div class="container-fluid py-3 bg-white border-bottom">
			<div class="row justify-content-center">
				<div class="col-12 col-md-6 col-lg-4">
					<form action="" method="get">
						<div class="input-group">
							<input class="form-control px-4" type="text" name="search" placeholder="Search products..." style="border-top-left-radius: 50px; border-bottom-left-radius: 50px; border: 1px solid #eaeaea; font-size: 0.9rem;">
							<button class="btn btn-danger px-4" type="submit" style="border-top-right-radius: 50px; border-bottom-right-radius: 50px; font-size: 0.9rem;"><i class="fa-solid fa-magnifying-glass"></i></button>
						</div>
					</form>
				</div>
			</div>
		</div>
		
		<!-- category side bar start -->
		<div class="container-fluid">
			<div class="row">
				<div class="col-md-2 mt-1 p-0">
					<div class="card shadow-sm p-0 mb-5 bg-body-tertiary rounded">
						<div class="card-body">
							<div class="list-group">
								<p class="fs-5">Category</p>
								<a href="/products" class="list-group-item list-group-item-action"
									th:classappend="${paramValue == ''} ? 'active' : ''"
									aria-current="true"> All </a> 
								
								<a href="#" th:each="category : ${allActiveCategory}" th:href="@{'/products?category='+${category.categoryName}}"
								    th:classappend="${paramValue == category.categoryName} ? 'active' : '' "
									class="list-group-item list-group-item-action">[[${category.categoryName}]]</a>
								
							</div>

						</div>
					</div>
					
				</div>

				<div class="col-md-10">
					<div class="card mt-1 shadow-sm p-3 mb-5 bg-body-tertiary rounded">
						<div class="card-body">
							<p class="fs-3 text-center">Products</p>
							<div class="row">
							
							
							<th:block th:if="${allActiveProducts.size > 0}">
								<div class="col-12 col-sm-6 col-md-4 col-lg-3 mb-4 d-flex align-items-stretch" th:each="product : ${allActiveProducts}">
									<div class="card product-card w-100 shadow-sm border-0 d-flex flex-column justify-content-between">
										<div class="product-img-wrapper position-relative">
											<img alt="product_image" th:src="@{'/img/product_image/'+${product.productImage}}" class="card-img-top">
											<span th:if="${product.discount > 0}" class="badge bg-danger position-absolute top-0 end-0 m-3 px-2 py-1 fs-7">[[${product.discount}]]% OFF</span>
										</div>
										<div class="card-body d-flex flex-column justify-content-between p-3">
											<div>
												<p class="text-uppercase text-secondary fs-7 mb-1 font-monospace">[[${product.productCategory}]]</p>
												<h5 class="card-title text-dark fw-bold fs-6 mb-2">[[${product.productTitle}]]</h5>
											</div>
											<div>
												<div class="d-flex align-items-center mb-3">
													<span class="fs-5 fw-bold text-dark me-2">&#8377; [[${product.discountPrice}]]</span>
													<span th:if="${product.productPrice > product.discountPrice}" class="fs-7 text-decoration-line-through text-muted">&#8377; [[${product.productPrice}]]</span>
												</div>
												<a th:href="@{'/product/'+${product.id}}" class="btn btn-danger w-100 rounded-pill py-2 fw-semibold fs-7 hover-scale text-decoration-none">Details</a>
											</div>
										</div>
									</div>
								</div>
							</th:block>
							<th:block th:unless="${allActiveProducts.size > 0}">
								<p class="fs-3 text-danger mt-3 text-center">No Products Found for this category!</p>
							</th:block>
							
								



							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
		<!-- category side bar end -->
		<script>
		element.style.zIndex = 2;
		element.style.backgroundColor = "#DC3545";
		element.style.borderColor = "#DC3545";
		</script>
	</section>
</body>
</html>
